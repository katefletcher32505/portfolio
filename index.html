<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kate Fletcher | Integrated Studies Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfbf9;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent: #4a5568;
            --border: #e2e8f0;
            --section-padding: 100px 5%;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            background: rgba(252, 251, 249, 0.9);
            border-bottom: 1px solid var(--border);
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        section {
            padding: var(--section-padding);
            max-width: 1400px;
            margin: 0 auto;
            min-height: 80vh;
        }

        #home {
            min-height: 100vh;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
        }

        .hero-statement {
            font-size: 1.5rem;
            max-width: 800px;
            margin: 2rem auto;
            color: var(--accent);
            font-style: italic;
        }
    </style>
</head>

<body>

<nav>
    <div>Kate Fletcher</div>
    <ul>
        <li><a href="#about">Framework</a></li>
        <li><a href="#pillars">The Pillars</a></li>
        <li><a href="#synthesis">The Synthesis</a></li>
        <li><a href="#vault">The Vault</a></li>
    </ul>
</nav>

<section id="home">
    <h1 class="hero-title">
        Behavioral Insights & <br><i>Rhetorical Strategy.</i>
    </h1>

    <!-- ✅ THIS IS THE ONLY PART WE CHANGED -->
    <p class="hero-statement">
        I study how people think, what they believe, and why trust breaks—using psychology and rhetoric to make sense of systems that shape perception, behavior, and power.
    </p>

</section>

</body>
</html>
