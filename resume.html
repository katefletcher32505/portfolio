<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume | Kate Fletcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #fcfbf9;
      --surface: #ffffff;
      --text-main: #161616;
      --text-muted: #5f6672;
      --border: #e3e8ef;
      --max-width: 960px;
      --shadow: 0 10px 24px rgba(20, 20, 20, 0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      line-height: 1.7;
      padding: 40px 5%;
    }

    h1, h2 {
      font-family: "Playfair Display", serif;
      letter-spacing: -0.02em;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 28px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 28px;
    }

    h1 {
      font-size: clamp(2.1rem, 5vw, 3.5rem);
      margin-bottom: 14px;
    }

    .intro {
      color: var(--text-muted);
      max-width: 700px;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="top-link" href="index.html">← Back to Portfolio</a>
    <div class="card">
      <h1>Resume</h1>
      <p class="intro">
        This page will hold my full resume, experience, education, skills, and future downloadable materials.
      </p>
      <p>
        Placeholder page for now — we can turn this into either a clean web resume or a styled landing page that links to a PDF version.
      </p>
    </div>
  </div>
</body>
</html>
